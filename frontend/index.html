<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-4">

    <h2 class="text-center text-primary">Inventory Management System</h2>

    <!-- FORM -->
    <div class="card p-3 mt-3">
        <input id="name" class="form-control mt-2" placeholder="Product Name">
        <input id="quantity" type="number" class="form-control mt-2" placeholder="Quantity">
        <input id="price" type="number" class="form-control mt-2" placeholder="Price">

        <button class="btn btn-success mt-3" onclick="addItem()">Save Item</button>
    </div>

    <!-- TABLE -->
    <table class="table table-bordered mt-4">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Total</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="inventoryTable"></tbody>
    </table>

</div>

<script src="script.js"></script>
</body>
</html>
