<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-4">

    <h2 class="text-center text-primary">Inventory Management System</h2>

    <!-- ADD ITEM FORM -->
    <div class="card p-3 mt-4">
        <h5>Add Product</h5>

        <input type="text" id="name" class="form-control mt-2" placeholder="Product Name">
        <input type="number" id="quantity" class="form-control mt-2" placeholder="Quantity">
        <input type="number" id="price" class="form-control mt-2" placeholder="Price">

        <button class="btn btn-success mt-3" onclick="addItem()">Add Item</button>
    </div>

    <!-- TABLE -->
    <table class="table table-bordered table-striped mt-4">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Total</th>
            </tr>
        </thead>

        <tbody id="inventoryTable">
        </tbody>
    </table>

</div>

<script src="script.js"></script>
</body>
</html>
